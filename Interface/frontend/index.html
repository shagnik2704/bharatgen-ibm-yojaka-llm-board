<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Arena v2 - DOK Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }
        .custom-glow { box-shadow: 0 0 25px rgba(59, 130, 246, 0.15); }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        
        /* Smooth scroll for the response area */
        .output-container { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-300 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-3xl bg-[#161b2b] rounded-3xl border border-slate-800 p-8 custom-glow">
        
        <div class="flex items-center justify-between mb-8 border-b border-slate-800 pb-5">
            <div>
                <h1 class="text-xl font-bold text-white tracking-tighter">LLM_ARENA_INTERFACE</h1>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.2em]">DOK Question Generator</p>
            </div>
            <div class="flex gap-2 text-xs text-slate-500 font-bold">STABLE_V2.0</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">1. Depth of Knowledge (DOK)</label>
                <select id="depth" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 text-sm text-white">
                    <option value="DOK 1: Recall">DOK 1: Recall</option>
                    <option value="DOK 2: Skill/Concept">DOK 2: Skill/Concept</option>
                    <option value="DOK 3: Strategic Thinking">DOK 3: Strategic Thinking</option>
                    <option value="DOK 4: Extended Thinking">DOK 4: Extended Thinking</option>
                </select>
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">2. Theme</label>
                <select id="theme" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 text-sm text-white">
                    <option value="Math">Math</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                </select>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">3. Topic</label>
            <input id="topic" type="text" placeholder="e.g. Photosynthesis" 
                class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 text-sm text-white">
        </div>

        <div class="mb-6">
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">4. Select Engine</label>
            <select id="modelSelect" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 text-sm text-white">
                <option value="gemini">Google Gemini 1.5 Flash</option>
                <option value="chatgpt">OpenAI GPT-4o</option>
                <option value="local-llama">Local Llama</option>
            </select>
        </div>

        <button onclick="fetchAnswer()" id="runBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-white shadow-lg transition-all active:scale-[0.98]">
            EXECUTE EVALUATION
        </button>

        <div id="responseArea" class="mt-8 hidden space-y-6 output-container">
            
            <div class="animate-in fade-in duration-500">
                <div class="flex items-center justify-between mb-2 px-1">
                    <div class="flex items-center gap-2">
                        <span id="activeModelTag" class="text-[9px] font-bold px-2 py-0.5 rounded bg-blue-500/10 text-blue-400 border border-blue-500/20 uppercase tracking-widest">GEMINI</span>
                        <span class="text-[9px] text-slate-600 uppercase">● Question Block</span>
                    </div>
                    <button onclick="copyText('questionText')" class="text-[9px] text-slate-500 hover:text-white transition-colors uppercase font-bold">Copy Question</button>
                </div>
                <div id="questionText" class="w-full bg-black/40 border border-slate-800 rounded-2xl p-6 text-sm leading-relaxed whitespace-pre-wrap text-slate-200 min-h-[60px]">
                    ...
                </div>
            </div>

            <div class="animate-in fade-in slide-in-from-bottom-2 duration-700">
                <div class="flex items-center gap-2 mb-2 px-1">
                    <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 uppercase tracking-widest">REFERENCE</span>
                    <span class="text-[9px] text-slate-600 uppercase">● Expected Answer</span>
                </div>
                <div id="answerText" class="w-full bg-emerald-500/5 border border-emerald-900/30 rounded-2xl p-6 text-sm leading-relaxed whitespace-pre-wrap text-emerald-100/80 min-h-[60px]">
                    ...
                </div>
            </div>

        </div>
    </div>

    <script>
        async function fetchAnswer() {
            const topic = document.getElementById('topic').value;
            if (!topic.trim()) return alert("Please enter a topic.");

            const btn = document.getElementById('runBtn');
            const outputArea = document.getElementById('responseArea');
            const qText = document.getElementById('questionText');
            const aText = document.getElementById('answerText');
            const tag = document.getElementById('activeModelTag');

            // Reset and Loading State
            btn.innerHTML = 'PROCESSING <span class="loading-dots"></span>';
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            
            outputArea.classList.remove('hidden');
            qText.innerText = "Processing prompt...";
            aText.innerText = "Calculating solution...";
            tag.innerText = document.getElementById('modelSelect').value;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model_id: document.getElementById('modelSelect').value,
                        depth: document.getElementById('depth').value,
                        theme: document.getElementById('theme').value,
                        topic: topic
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    qText.innerText = data.question;
                    aText.innerText = data.answer;
                } else {
                    throw new Error(data.detail || "Server Error");
                }

            } catch (error) {
                qText.innerHTML = `<span class="text-red-400 font-bold underline">ERROR:</span> ${error.message}`;
                aText.innerText = "The generation failed. Please check your API Quota or network connection.";
            } finally {
                btn.innerHTML = 'EXECUTE EVALUATION';
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
