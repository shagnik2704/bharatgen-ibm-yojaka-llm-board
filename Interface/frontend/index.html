            const topic = document.getElementById('topic').value;
            const theme = document.getElementById('theme').value || "Standard";
            const qType = document.getElementById('qType').value;
            
            if (!topic.trim()) return alert("Please enter a topic.");

            const btn = document.getElementById('runBtn');

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');
        
        /* Study-Oriented Color Palette */

        body {

        }

        .glass-panel { 
            background: var(--card-study); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .active-subject { 
            background: rgba(99, 102, 241, 0.15) !important; 
            border-color: #6366f1 !important; 
            color: #818cf8 !important;
        }

        .question-text {
            line-height: 1.7;
            letter-spacing: -0.01em;
        }

        /* Smooth Transition for Study Mode */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-12">
        <div>
            <h1 class="text-3xl font-bold tracking-tighter italic">BHARAT<span class="text-blue-500">GEN</span></h1>
            <div class="h-1 w-12 bg-blue-500 rounded-full mt-1"></div>
        </div>
        <div class="flex items-center gap-4">
            <span id="currentModelLabel" class="hidden md:block text-[10px] font-bold text-slate-500 uppercase tracking-widest">Engine: Gemini 3 Flash</span>
            <button onclick="toggleSettings()" class="w-10 h-10 glass-panel rounded-full flex items-center justify-center hover:bg-slate-800 transition">
                <i class="fa-solid fa-sliders"></i>
            </button>
        </div>
    </header>

    <div id="settingsModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="glass-panel p-8 rounded-3xl w-full max-w-md border border-slate-700">
            <h3 class="text-xl font-bold mb-6 text-white">Execution Settings</h3>
            <label class="text-xs font-bold text-slate-400 uppercase">Primary LLM Engine</label>
            <select id="modelSelect" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 mt-2 text-white outline-none focus:border-blue-500">
                <option value="gemini">Google Gemini 3 Flash Preview</option>
                <option value="chatgpt">OpenAI GPT-4o</option>
                <option value="local-llama">Local Llama 3</option>
                <option value="qwen">Alibaba Qwen 3 (8B)</option>
                <option value="granite3.3:8b">Granite 3 (8B)</option>
                <option value="rag-piped-llama">RAG-Piped Llama</option>
            </select>
            <button onclick="toggleSettings()" class="w-full bg-blue-600 mt-8 py-4 rounded-xl font-bold hover:bg-blue-500 transition">Save Configuration</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 space-y-6">
            <div class="glass-panel p-6 rounded-[2rem] space-y-6">
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Select Subject</label>
                    <div class="grid grid-cols-2 gap-3 mt-3">
                        <button onclick="setSubject('Math', this)" class="subj-btn border border-slate-800 p-3 rounded-2xl text-xs font-bold transition-all hover:border-blue-500">MATHEMATICS</button>
                        <button onclick="setSubject('Physics', this)" class="subj-btn border border-slate-800 p-3 rounded-2xl text-xs font-bold transition-all hover:border-purple-500">PHYSICS</button>
                        <button onclick="setSubject('Chemistry', this)" class="subj-btn border border-slate-800 p-3 rounded-2xl text-xs font-bold transition-all hover:border-emerald-500">CHEMISTRY</button>

                    <input id="topic" type="text" placeholder="Specific Topic (e.g. Parts)" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 transition">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="depth" class="bg-slate-950 border border-slate-800 rounded-2xl p-4 text-xs font-bold outline-none focus:border-blue-500">
                    <option value="DOK level 1: Recall and Reproduction">DOK level 1: Recall and Reproduction</option>
                    <option value="DOK level 2: Basic skills and concepts">DOK level 2: Basic skills and concepts</option>
                    <option value="DOK level 3: Strategic thinking and reasoning">DOK level 3: Strategic thinking and reasoning</option>
                    <option value="DOK level 4: Extended Thinking">DOK level 4: Extended Thinking</option>
                    </select>
                    <input id="qCount" type="number" value="3" min="1" max="10" class="bg-slate-950 border border-slate-800 rounded-2xl p-4 text-xs font-bold outline-none focus:border-blue-500">
                </div>

                <button onclick="startSession()" id="genBtn" class="w-full bg-white text-black py-4 rounded-2xl font-black text-sm tracking-tighter hover:bg-blue-500 hover:text-white transition-all shadow-xl shadow-blue-500/10">
                    GENERATE NCERT BATTLE
                </button>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div id="welcomeView" class="glass-panel h-[500px] rounded-[3rem] flex flex-col items-center justify-center text-center p-10">
                <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mb-6">
                    <i class="fa-solid fa-bolt-lightning text-blue-500 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold">Ready for a Challenge?</h2>
                <p class="text-slate-500 mt-2 text-sm max-w-xs">Select your subject and chapter to generate NCERT-aligned questions.</p>
            </div>

            <div id="questionView" class="hidden space-y-4">

                    <div class="flex gap-2">
                        <button onclick="prevQ()" class="w-10 h-10 glass-panel rounded-xl flex items-center justify-center hover:bg-slate-800"><i class="fa-solid fa-arrow-left"></i></button>
                        <button onclick="nextQ()" class="w-10 h-10 glass-panel rounded-xl flex items-center justify-center hover:bg-slate-800"><i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>

                <div class="glass-panel p-10 rounded-[3rem] border-t-4 border-blue-500 min-h-[300px] flex flex-col justify-center">
                    <div id="qContent" class="text-xl leading-relaxed text-white">...</div>
                </div>

                <div class="space-y-4">
                    <button id="revealBtn" onclick="toggleAnswer()" class="w-full py-4 rounded-2xl border-2 border-dashed border-slate-800 text-slate-500 font-bold hover:border-emerald-500 hover:text-emerald-500 transition">
                        REVEAL ANSWER & LOGIC
                    </button>
                    <div id="aContent" class="hidden glass-panel p-8 rounded-[2rem] border-l-4 border-emerald-500 bg-emerald-500/5 text-emerald-100 italic leading-relaxed">
                        ...
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let questions = [];
        let cursor = 0;
        let activeSubject = "";

        function toggleSettings() { 
            document.getElementById('settingsModal').classList.toggle('hidden');
            const model = document.getElementById('modelSelect').value;
            document.getElementById('currentModelLabel').innerText = `Engine: ${model}`;
        }

        function setSubject(s, btn) {
            activeSubject = s;
            document.querySelectorAll('.subj-btn').forEach(b => b.classList.remove('active-subject'));
            btn.classList.add('active-subject');
        }

        function toggleAnswer() {
            const a = document.getElementById('aContent');
            a.classList.toggle('hidden');
            document.getElementById('revealBtn').innerText = a.classList.contains('hidden') ? "REVEAL ANSWER & LOGIC" : "HIDE LOGIC";
        }

        async function startSession() {
            const btn = document.getElementById('genBtn');
            const topic = document.getElementById('topic').value;
            if(!activeSubject || !topic) return alert("Pick a Subject and Topic!");

            // UI Transition
            questions = []; cursor = 0;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> COGITATING...';
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('questionView').classList.remove('hidden');
            document.getElementById('qContent').className = "loading-shimmer h-24 rounded-2xl w-full";
            
            const count = document.getElementById('qCount').value;

            for(let i=0; i<count; i++) {
                try {
                    const res = await fetch('/ask', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            model_id: document.getElementById('modelSelect').value,
                            depth: document.getElementById('depth').value,
                            subject: activeSubject,
                            chapter: document.getElementById('chapter').value,
                            topic: topic,
                            qType: "MCQ"
                        })
                    });
                    const data = await res.json();
                    questions.push(data);
                    if(i === 0) renderQ();
                } catch(e) { console.error(e); }
            }
            btn.innerText = "GENERATE NCERT BATTLE";
        }

        function renderQ() {
            const q = questions[cursor];
            document.getElementById('qContent').className = "text-xl leading-relaxed text-white";
            document.getElementById('qContent').innerText = q.question;
            document.getElementById('aContent').innerText = q.answer;
            document.getElementById('aContent').classList.add('hidden');
            document.getElementById('progressBar').innerText = `Question ${cursor + 1} of ${questions.length}`;
            document.getElementById('revealBtn').innerText = "REVEAL ANSWER & LOGIC";
        }

        function nextQ() { if(cursor < questions.length - 1) { cursor++; renderQ(); } }
        function prevQ() { if(cursor > 0) { cursor--; renderQ(); } }
    </script>
</body>
</html> -->

                    </label>
                </div>

                <button onclick="startSession()" id="genBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-[1.8rem] font-bold text-xs tracking-[0.2em] shadow-xl shadow-indigo-600/10 transition-all active:scale-95">

                        <button onclick="nextQ()" class="w-12 h-12 glass-panel rounded-2xl flex items-center justify-center hover:bg-slate-800 active:scale-90 transition"><i class="fa-solid fa-chevron-right text-xs"></i></button>

                </div>

                    </button>

    <script>
        const availableTypes = [
            "Multiple Choice (MCQ)", "Short Answer", "True/False", 
            "Essay Prompt", "Case Study Analysis", "Fill-in-the-Blanks"
        ];

        let allQuestions = [];
        let filteredQuestions = [];
        let cursor = 0;
        let activeSubject = "";
        let activeDepth = "DOK level 1: Recall & Reproduction";

        // Initialize Type inputs
        const typeContainer = document.getElementById('typeDistribution');
        availableTypes.forEach(type => {
            const div = document.createElement('div');
            div.className = "type-input flex justify-between items-center p-3 rounded-2xl";
            div.innerHTML = `
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">${type}</span>
                <input type="number" data-type="${type}" value="0" min="0" class="q-type-count w-12 bg-transparent text-center font-bold text-indigo-400 outline-none">
            `;
            typeContainer.appendChild(div);
        });

        function toggleSettings() { 
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('hidden');
            const modelName = document.getElementById('modelSelect').options[document.getElementById('modelSelect').selectedIndex].text;
            document.getElementById('currentModelLabel').innerText = modelName;
        }

        function setSubject(s, btn) {
            activeSubject = s;
            document.querySelectorAll('.subj-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
        }

        function setDepth(d, btn) {
            activeDepth = d;
            document.querySelectorAll('.depth-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
        }

        function toggleAnswer() {
            const a = document.getElementById('aContent');
            a.classList.toggle('hidden');
            document.getElementById('revealBtn').innerText = a.classList.contains('hidden') ? "REVEAL STUDY LOGIC" : "HIDE LOGIC";
        }

        async function startSession() {
            const btn = document.getElementById('genBtn');
            const topic = document.getElementById('topic').value;
            const chapter = document.getElementById('chapter').value;
            const shuffle = document.getElementById('shuffleToggle').checked;

            if(!activeSubject || !topic) return alert("Select Subject & Topic");

            // Collect distribution
            const typeRequests = [];
            document.querySelectorAll('.q-type-count').forEach(input => {
                const count = parseInt(input.value);
                if(count > 0) {
                    typeRequests.push({ type: input.dataset.type, count: count });
                }
            });

            if(typeRequests.length === 0) return alert("Enter number of questions for at least one type.");

            // UI Reset
            allQuestions = []; cursor = 0;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> GENERATING...';
            btn.disabled = true;

            try {
                // Fire multiple requests simultaneously
                const promises = typeRequests.map(req => 
                    fetch('/ask', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            model_id: document.getElementById('modelSelect').value,
                            depth: activeDepth,
                            subject: activeSubject,
                            chapter: chapter,
                            topic: topic,
                            qType: req.type,
                            num_questions: req.count
                        })
                    }).then(r => r.json())
                );

                const results = await Promise.all(promises);
                
                // Flatten results and tag them by type
                results.forEach((data, index) => {
                    if (Array.isArray(data)) {
                        const typeName = typeRequests[index].type;
                        data.forEach(q => q.category = typeName);
                        allQuestions.push(...data);
                    }
                });

                if (shuffle) {
                    allQuestions.sort(() => Math.random() - 0.5);
                }

                filteredQuestions = [...allQuestions];
                renderTabs(typeRequests);
                
                document.getElementById('welcomeView').classList.add('hidden');
                document.getElementById('questionView').classList.remove('hidden');
                renderQ();

            } catch(e) { 
                console.error(e); 
                alert("Generation failed. Please try again.");
            } finally {
                btn.innerHTML = 'GENERATE SESSION';
                btn.disabled = false;
            }
        }

        function renderTabs(reqs) {
            const tabContainer = document.getElementById('typeTabs');
            tabContainer.innerHTML = `<button onclick="filterType('All')" class="tab-btn px-6 py-2 glass-panel rounded-full text-[10px] font-bold active-btn">ALL</button>`;
            
            reqs.forEach(req => {
                const btn = document.createElement('button');
                btn.className = "tab-btn px-6 py-2 glass-panel rounded-full text-[10px] font-bold whitespace-nowrap";
                btn.innerText = req.type.toUpperCase();
                btn.onclick = () => filterType(req.type, btn);
                tabContainer.appendChild(btn);
            });
        }

        function filterType(type, btn) {
            if(type === 'All') {
                filteredQuestions = [...allQuestions];
            } else {
                filteredQuestions = allQuestions.filter(q => q.category === type);
            }
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-btn'));
            if(btn) btn.classList.add('active-btn');
            else document.querySelector('.tab-btn').classList.add('active-btn');

            cursor = 0;
            renderQ();
        }

        function renderQ() {
            if(filteredQuestions.length === 0) return;
            const q = filteredQuestions[cursor];
            document.getElementById('qTypeLabel').innerText = q.category || "General Question";
            document.getElementById('qContent').innerText = q.question;
            document.getElementById('aContent').innerText = q.answer;
            document.getElementById('aContent').classList.add('hidden');
            document.getElementById('progressBar').innerText = `PROGRESS: ${cursor + 1} OF ${filteredQuestions.length}`;
            document.getElementById('revealBtn').innerText = "REVEAL STUDY LOGIC";
        }

        function nextQ() { if(cursor < filteredQuestions.length - 1) { cursor++; renderQ(); } }
        function prevQ() { if(cursor > 0) { cursor--; renderQ(); } }
    </script>
