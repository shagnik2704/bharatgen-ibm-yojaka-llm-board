<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Restored your original font and styling exactly */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }
        .custom-glow { box-shadow: 0 0 25px rgba(59, 130, 246, 0.15); }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }

</head>
<body class="bg-[#0b0f1a] text-slate-300 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-3xl bg-[#161b2b] rounded-3xl border border-slate-800 p-8 custom-glow">
        
        <div class="flex items-center justify-between mb-8 border-b border-slate-800 pb-5">
            <div>
                <h1 class="text-xl font-bold text-white tracking-tighter italic">BHARAT<span class="text-blue-500">GEN</span></h1>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.2em]">Project Yojaka // DOK Evaluator</p>
            </div>
            <div class="flex gap-2 text-xs text-slate-500 font-bold tracking-tighter">STABLE_V2.2_YJ</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">1. Depth of Knowledge (DOK)</label>
                <select id="depth" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 text-sm text-white">
                    <option value="DOK level 1: Recall and Reproduction">DOK level 1: Recall and Reproduction</option>
                    <option value="DOK level 2: Basic skills and concepts">DOK level 2: Basic skills and concepts</option>
                    <option value="DOK level 3: Strategic thinking and reasoning">DOK level 3: Strategic thinking and reasoning</option>
                    <option value="DOK level 4: Extended Thinking">DOK level 4: Extended Thinking</option>
                </select>
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">2. Question Type</label>
                <select id="qType" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 text-sm text-white">
                    <option value="Multiple Choice (MCQ)">Multiple Choice (MCQ)</option>
                    <option value="Short Answer">Short Answer</option>
                    <option value="True/False">True/False</option>
                    <option value="Essay Prompt">Essay Prompt</option>
                    <option value="Case Study Analysis">Case Study Analysis</option>
                    <option value="Scenario-Based Problem">Scenario-Based Problem</option>
                    <option value="Matching Items">Matching Items</option>
                    <option value="Fill-in-the-Blanks">Fill-in-the-Blanks</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">3. Theme / Context</label>
                <input id="theme" type="text" placeholder="e.g. Digital India, Rural Context" 
                    class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 text-sm text-white">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">4. Topic</label>
                <input id="topic" type="text" placeholder="e.g. Constitutional Law" 
                    class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 text-sm text-white">
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">5. Select Engine</label>
            <select id="modelSelect" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 text-sm text-white">
                <option value="local-llama">Local Llama 3</option>
                <option value="qwen">Alibaba Qwen 3 (8B)</option>
                <option value="gemini">Google Gemini 3 Flash Preview</option>
            </select>
        </div>

        <button onclick="fetchAnswer()" id="runBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-white shadow-lg transition-all active:scale-[0.98]">
            EXECUTE EVALUATION
        </button>

        <div id="responseArea" class="mt-8 hidden space-y-6 output-container">
            
            <div class="animate-in fade-in duration-500">
                <div class="flex items-center justify-between mb-2 px-1">
                    <div class="flex items-center gap-2">
                        <span id="activeModelTag" class="text-[9px] font-bold px-2 py-0.5 rounded bg-blue-500/10 text-blue-400 border border-blue-500/20 uppercase tracking-widest">GEMINI</span>
                        <span class="text-[9px] text-slate-600 uppercase font-bold">● Generated Question</span>
                    </div>
                    <button onclick="copyText('questionText')" class="text-[9px] text-slate-500 hover:text-white transition-colors uppercase font-bold">Copy</button>
                </div>
                <div id="questionText" class="w-full bg-black/40 border border-slate-800 rounded-2xl p-6 text-sm leading-relaxed whitespace-pre-wrap text-slate-200 min-h-[60px]">
                    ...
                </div>
            </div>

            <div class="animate-in fade-in slide-in-from-bottom-4 duration-700">
                <div class="flex items-center justify-between mb-2 px-1">
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 uppercase tracking-widest">ANSWER KEY</span>
                        <span class="text-[9px] text-slate-600 uppercase font-bold">● Logic & Explanation</span>
                    </div>
                    <button onclick="copyText('answerText')" class="text-[9px] text-slate-500 hover:text-white transition-colors uppercase font-bold">Copy</button>
                </div>
                <div id="answerText" class="w-full bg-emerald-950/10 border border-emerald-900/30 rounded-2xl p-6 text-sm leading-relaxed whitespace-pre-wrap text-emerald-100/80 min-h-[60px]">
                    ...
                </div>
            </div>

        </div>
    </div>

    <script>
        async function fetchAnswer() {
            const topic = document.getElementById('topic').value;
            const theme = document.getElementById('theme').value || "Standard";
            const qType = document.getElementById('qType').value;
            
            if (!topic.trim()) return alert("Please enter a topic.");

            const btn = document.getElementById('runBtn');
            const outputArea = document.getElementById('responseArea');
            const qText = document.getElementById('questionText');
            const aText = document.getElementById('answerText');
            const tag = document.getElementById('activeModelTag');

            // UI Loading State
            btn.innerHTML = 'GENERATING ASSESSMENT <span class="loading-dots"></span>';
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            
            outputArea.classList.remove('hidden');
            qText.innerText = "Processing question logic...";
            aText.innerText = "Preparing answer key...";
            tag.innerText = document.getElementById('modelSelect').value.toUpperCase();

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model_id: document.getElementById('modelSelect').value,
                        depth: document.getElementById('depth').value,
                        theme: theme,
                        topic: topic,
                        qType: qType
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    // Update the text boxes with parsed JSON data
                    qText.innerText = data.question;
                    aText.innerText = data.answer;
                } else {
                    throw new Error(data.detail || "Server Error");
                }

            } catch (error) {
                qText.innerHTML = `<span class="text-red-400 font-bold underline">ERROR:</span> ${error.message}`;
                aText.innerText = "Failed to retrieve answer.";
            } finally {
                btn.innerHTML = 'EXECUTE EVALUATION';
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const originalText = document.querySelector(`button[onclick="copyText('${id}')"]`).innerText;
            
            // Temporary feedback for copy
            const btn = document.querySelector(`button[onclick="copyText('${id}')"]`);
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 1500);
        }
    </script>
</body>
</html>
