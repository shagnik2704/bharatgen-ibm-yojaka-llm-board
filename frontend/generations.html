<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatGen - Sessions Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --card-bg: #ffffff;
            --card-border: rgba(15, 23, 42, 0.08);
            --accent-primary: #6366f1;
            --text-primary: #1e293b;
            --text-secondary: #475569;
        }

        [data-theme="dark"] {
            --bg-primary: #0f1420;
            --bg-secondary: #161d2f;
            --card-bg: #161d2f;
            --card-border: rgba(255, 255, 255, 0.05);
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            background-image: radial-gradient(circle at 50% -20%, var(--bg-primary) 0%, var(--bg-primary) 100%);
        }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-running { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #dcfce7; color: #15803d; }
        .status-failed { background: #fee2e2; color: #b91c1c; }
        .status-pending { background: #fef3c7; color: #92400e; }

        .progress-bar-container {
            height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-primary);
            transition: width 0.5s ease-out;
        }

        .session-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .session-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .session-card.active {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px var(--accent-primary);
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .logo-img { height: 40px; filter: none; }
        [data-theme="dark"] .logo-img { filter: invert(1) brightness(1.2); }

        .rubric-panel {
            border-color: rgba(16, 185, 129, 0.25);
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.08), rgba(16, 185, 129, 0.03));
        }
        .question-text {
            line-height: 1.8;
            letter-spacing: -0.01em;
            white-space: pre-line;
        }
        .modal-overlay {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
        }
        .rubric-mark {
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.03);
        }
        [data-theme="light"] .rubric-mark {
            background: rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-7xl mx-auto w-full flex items-center justify-between mb-10">
        <div class="flex items-center gap-4">
            <img src="/static/logo/BharatGen.svg" class="logo-img" onclick="window.location.href='/'" style="cursor:pointer">
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            <h1 class="text-xl font-extrabold tracking-tight hidden md:block">Sessions Dashboard</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='/'" class="px-4 py-2 glass-panel rounded-xl text-xs font-bold hover:bg-gray-50 transition-all flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> New Session
            </button>
            <button onclick="toggleTheme()" class="w-10 h-10 glass-panel rounded-xl flex items-center justify-center">
                <i id="themeIcon" class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sidebar: Session List -->
        <div class="lg:col-span-5 space-y-4">
            <div class="flex items-center justify-between px-1">
                <h2 class="text-xs font-black uppercase tracking-widest text-gray-500">Recent Sessions</h2>
                <button onclick="refreshSessions()" class="text-xs font-bold text-indigo-500 hover:underline">
                    <i class="fa-solid fa-rotate"></i> Refresh
                </button>
            </div>
            
            <div id="sessionList" class="space-y-3 max-h-[70vh] overflow-y-auto pr-2 custom-scroll">
                <!-- Session items will be injected here -->
                <div class="glass-panel p-8 rounded-2xl text-center opacity-50">
                    <i class="fa-solid fa-circle-notch fa-spin mb-3"></i>
                    <p class="text-sm">Loading activity...</p>
                </div>
            </div>
        </div>

        <!-- Main: Live Feed -->
        <div class="lg:col-span-7">
            <div id="feedHeader" class="mb-4 hidden">
                <div class="flex items-center justify-between mb-1">
                    <h2 class="text-xs font-black uppercase tracking-widest text-gray-500">Questions</h2>
                    <button id="exportBtn" onclick="exportToExcel()" class="text-xs font-bold text-emerald-500 hover:underline flex items-center gap-1">
                        <i class="fa-solid fa-file-excel"></i> Export to Excel (.xlsx)
                    </button>
                </div>
                <div id="activeSessionTitle" class="text-lg font-bold">Select a session to view details</div>
            </div>

            <div id="questionsFeed" class="space-y-4">
                <div class="glass-panel h-[60vh] rounded-3xl flex flex-col items-center justify-center text-center p-8 border-dashed border-2 opacity-50">
                    <i class="fa-solid fa-layer-group text-4xl mb-4"></i>
                    <p class="text-sm max-w-xs">Select a session from the list on the left to see the questions being generated in real-time.</p>
                </div>
            </div>
        </div>

    </main>

    <!-- Question Detail Modal -->
    <div id="questionModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay" onclick="closeModal(event)">
        <div class="glass-panel w-full max-w-4xl max-h-[90vh] rounded-3xl overflow-y-auto custom-scroll relative" onclick="event.stopPropagation()">
            <!-- Close Button -->
            <button onclick="closeModal(null)" class="absolute top-6 right-6 w-10 h-10 rounded-full flex items-center justify-center bg-indigo-500 hover:bg-indigo-600 shadow-lg shadow-indigo-200 transition-all text-white">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <div class="p-8 md:p-12">
                <div id="modalQId" class="text-[10px] font-bold text-gray-400 mb-6 uppercase tracking-widest"></div>
                <div id="modalQType" class="text-xs font-black uppercase tracking-widest mb-2" style="color: var(--accent-primary);"></div>
                <div id="modalQStatus" class="text-[10px] font-semibold mb-6 text-gray-500"></div>
                <div id="modalQContent" class="question-text text-xl md:text-2xl font-medium mb-8"></div>
                
                <div id="modalRubric" class="rubric-panel rounded-3xl border p-6 md:p-8">
                    <div class="flex items-center justify-between mb-4">
                        <div class="text-xs font-black uppercase tracking-widest text-emerald-600">RUBRIC</div>
                        <div id="modalRubricMeta" class="text-[10px] font-bold text-gray-500"></div>
                    </div>
                    <div id="modalRubricBody" class="space-y-6"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTheme = localStorage.getItem('theme') || 'light';
        let selectedSessionId = null;
        let pollInterval = null;
        let currentQuestions = [];

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            const icon = document.getElementById('themeIcon');
            icon.className = currentTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            applyTheme();
        }

        async function fetchSessions() {
            try {
                const resp = await fetch('/api/sessions?limit=20');
                if (!resp.ok) return;
                const sessions = await resp.json();
                renderSessions(sessions);
            } catch (err) {
                console.error("Failed to fetch sessions", err);
            }
        }

        function renderSessions(sessions) {
            const container = document.getElementById('sessionList');
            if (sessions.length === 0) {
                container.innerHTML = '<div class="glass-panel p-8 rounded-2xl text-center opacity-50">No sessions found.</div>';
                return;
            }

            container.innerHTML = sessions.map(s => {
                const progress = Math.round((s.total_generated / s.total_requested) * 100);
                const isActive = s.id === selectedSessionId;
                const date = new Date(s.created_at).toLocaleString();
                
                return `
                    <div class="glass-panel p-4 rounded-2xl session-card ${isActive ? 'active' : ''}" onclick="selectSession('${s.id}', '${s.parameters.subject} - ${s.parameters.chapter}')">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <div class="text-sm font-bold truncate max-w-[200px]">${s.parameters.subject}</div>
                                <div class="text-[10px] text-gray-500">${s.parameters.chapter}</div>
                            </div>
                            <span class="status-badge status-${s.status}">${s.status}</span>
                        </div>
                        
                        <div class="flex items-center justify-between text-[10px] mb-1 font-bold">
                            <span>${s.total_generated} / ${s.total_requested} questions</span>
                            <span>${progress}%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" style="width: ${progress}%"></div>
                        </div>
                        <div class="text-[9px] text-gray-400 mt-2">${date}</div>
                    </div>
                `;
            }).join('');
        }

        async function selectSession(id, title) {
            selectedSessionId = id;
            document.getElementById('feedHeader').classList.remove('hidden');
            document.getElementById('activeSessionTitle').innerText = title;
            
            // Highlight selected card
            document.querySelectorAll('.session-card').forEach(c => c.classList.remove('active'));
            fetchSessions(); // Refresh list to show active state

            if (pollInterval) clearInterval(pollInterval);
            fetchQuestions();
            pollInterval = setInterval(fetchQuestions, 3000);
        }

        async function fetchQuestions() {
            if (!selectedSessionId) return;
            try {
                // Check session status to see if we should stop polling
                const statusResp = await fetch(`/api/session/${selectedSessionId}`);
                if (statusResp.ok) {
                    const session = await statusResp.json();
                    if (session.status === 'completed' || session.status === 'failed') {
                        if (pollInterval) {
                            clearInterval(pollInterval);
                            pollInterval = null;
                        }
                    }
                }

                const resp = await fetch(`/api/session/${selectedSessionId}/questions`);
                if (!resp.ok) return;
                const questions = await resp.json();
                currentQuestions = questions;
                renderQuestions(questions);
            } catch (err) {
                console.error("Failed to fetch questions", err);
            }
        }

        function renderQuestions(questions) {
            const container = document.getElementById('questionsFeed');
            if (questions.length === 0) {
                container.innerHTML = `
                    <div class="glass-panel p-12 rounded-3xl text-center opacity-50 border-dashed border-2">
                        <i class="fa-solid fa-hourglass fa-spin mb-4 text-2xl"></i>
                        <p class="text-sm">Wait... Workers are processing the first chunk.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = questions.slice().reverse().map((q, idx) => {
                const actualIdx = questions.length - 1 - idx;
                return `
                <div class="glass-panel p-6 rounded-2xl fade-in relative overflow-hidden cursor-pointer hover:border-indigo-300 transition-all" onclick="openQuestionModal(${actualIdx})">
                    <div class="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] font-black uppercase tracking-widest text-indigo-500">${q.qtype}</span>
                        <div class="flex gap-2">
                            <span class="text-[10px] font-bold text-gray-400">Score: ${Math.round(q.alignment_score * 100)}%</span>
                        </div>
                    </div>
                    <div class="text-sm font-medium leading-relaxed">${q.question}</div>
                    <div class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-800">
                        <div class="text-[10px] font-bold uppercase text-gray-400 mb-1">Answer Logic</div>
                        <div class="text-xs text-gray-600 dark:text-gray-400 italic line-clamp-2">${q.answer}</div>
                    </div>
                </div>
            `;}).join('');
            
            // Add "More coming" indicator if the session is still running
            const sessionList = document.querySelectorAll('.session-card');
            const currentSessionCard = Array.from(sessionList).find(c => c.classList.contains('active'));
            if (currentSessionCard && currentSessionCard.querySelector('.status-running')) {
                container.innerHTML += `
                    <div class="p-4 text-center text-[10px] font-bold uppercase tracking-widest text-gray-400 animate-pulse">
                        <i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Thinking about more questions...
                    </div>
                `;
            }
        }

        function refreshSessions() {
            fetchSessions();
        }

        function exportToExcel() {
            if (!selectedSessionId) return;
            window.location.href = `/api/session/${selectedSessionId}/export`;
        }

        function openQuestionModal(idx) {
            const q = currentQuestions[idx];
            if (!q) return;

            document.getElementById('modalQId').innerText = `Question ID: ${q.id}`;
            document.getElementById('modalQType').innerText = q.qtype;
            document.getElementById('modalQStatus').innerText = q.type_match_reason || "Matched requested type.";
            document.getElementById('modalQContent').innerHTML = marked.parse(q.question || '');

            // Render Rubric
            const rubric = q.rubric || {};
            const marks = Array.isArray(rubric.marks) ? rubric.marks : [];
            const keyPoints = Array.isArray(rubric.key_points) ? rubric.key_points : [];
            const totalMarks = rubric.total_marks || rubric.totalMarks || 10;
            const answerText = q.answer || rubric.answer || '';

            document.getElementById('modalRubricMeta').innerText = `Teacher rubric total: ${totalMarks} marks`;
            
            let rubricHtml = '';
            if (answerText) {
                rubricHtml += `
                    <div class="rubric-mark rounded-2xl p-4">
                        <div class="text-[10px] font-black uppercase tracking-widest mb-2 text-gray-400">Suggested answer</div>
                        <div class="text-sm leading-relaxed">${marked.parse(answerText)}</div>
                    </div>
                `;
            }

            if (marks.length > 0) {
                rubricHtml += `
                    <div>
                        <div class="text-[10px] font-black uppercase tracking-widest mb-3 text-gray-400">Marking points</div>
                        <div class="space-y-3">${formatRubricList(marks)}</div>
                    </div>
                `;
            }

            if (keyPoints.length > 0) {
                rubricHtml += `
                    <div>
                        <div class="text-[10px] font-black uppercase tracking-widest mb-3 text-gray-400">Key points</div>
                        <div class="flex flex-wrap gap-2">
                            ${keyPoints.map(point => `<span class="px-3 py-2 rounded-full text-[10px] font-semibold rubric-mark">${escapeHtml(point)}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            document.getElementById('modalRubricBody').innerHTML = rubricHtml;

            document.getElementById('questionModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        function formatRubricList(items) {
            if (!Array.isArray(items)) return '';
            return items.map(item => {
                if (typeof item === 'object' && item !== null) {
                    const criterion = item.criterion || item.label || item.name || 'Criterion';
                    const score = item.marks ?? item.score ?? item.value ?? '';
                    return `
                        <div class="rubric-mark rounded-2xl p-4 flex items-start justify-between gap-4">
                            <div class="text-xs font-semibold">${escapeHtml(criterion)}</div>
                            <div class="text-base font-black text-emerald-600">${score}</div>
                        </div>
                    `;
                }
                return `<div class="rubric-mark rounded-2xl p-4 text-xs">${escapeHtml(item)}</div>`;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeModal(event) {
            if (event && event.target !== document.getElementById('questionModal') && event.target.closest('.glass-panel')) return;
            document.getElementById('questionModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Init
        applyTheme();
        fetchSessions();
        setInterval(fetchSessions, 5000); // Background refresh for session list

    </script>
</body>
</html>
